<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Área e Valor</title>
<link rel="stylesheet" 
href="style.css">
</head>
<body>

<div class="container">
    <h2>Calculadora de Área</h2>

    <label>Nome do Local</label>
    <input type="text" id="local" placeholder="Ex: Sala">

    <label>Largura (m)</label>
    <input type="number" id="largura" step="0.01">

    <label>Comprimento (m)</label>
    <input type="number" id="comprimento" step="0.01">

    <label>Valor por m² (R$)</label>
    <input type="number" id="valorMetro" step="0.01">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado">
        Preencha os dados e clique em calcular.
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
