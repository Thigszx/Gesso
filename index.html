<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMV Gesso - Orçamentos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="card">

<div class="cabecalho">
<h1>TMV GESSO</h1>
<p>Forros • Divisórias • Acabamentos</p>
<hr style="margin-top:10px">
</div>

<div class="input-group">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="input-group">
<label>Telefone</label>
<input id="telefone">
</div>

<div class="input-group">
<label>Endereço</label>
<input id="endereco">
</div>

<div class="input-group">
<label>Ambiente / Local</label>
<input id="local">
</div>

<div class="input-group">
<label>Largura (m)</label>
<input type="number" step="0.01" id="largura">
</div>

<div class="input-group">
<label>Comprimento (m)</label>
<input type="number" step="0.01" id="comprimento">
</div>

<div class="input-group">
<label>Valor por m² (R$)</label>
<input type="number" step="0.01" id="valorMetro">
</div>

<button class="btn calc" onclick="calcular()">Calcular e Salvar</button>
<button class="btn pdf" onclick="window.print()">Gerar PDF</button>
<button class="btn reset" onclick="resetar()">Resetar Histórico</button>

<div class="box">
<h2>Resultado do Ambiente</h2>
<p id="resultadoArea">Área: 0 m²</p>
<p id="resultadoValor">Valor: R$ 0,00</p>
</div>

<div class="box">
<h2>Totais Gerais</h2>
<p id="totalArea">Metragem Total: 0 m²</p>
<p id="totalValor"><strong>Valor Total Geral: R$ 0,00</strong></p>
</div>

<div class="box">
<h2>Histórico</h2>
<div id="historico"></div>
</div>

</div>
</div>

<script src="main.js"></script>
</body>
</html>
