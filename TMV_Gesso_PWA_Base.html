<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMV Gesso PWA</title>
<meta name="theme-color" content="#006d6f">
<style>
body{font-family:Arial,sans-serif;background:#006d6f;padding:20px}
.card{max-width:900px;margin:auto;background:#f3f3f3;padding:25px;border-radius:25px}
h1{text-align:center;color:#161b69}
.btn{width:100%;padding:14px;border:none;border-radius:30px;color:#fff;font-weight:bold;margin-top:10px;cursor:pointer}
.install{background:#0d6efd}.pdf{background:#198754}.calc{background:#161b69}
.info{background:#e8e8e8;padding:15px;border-radius:12px;margin-top:15px}
</style>
</head>
<body>
<div class="card">
<h1>TMV GESSO</h1>
<p style="text-align:center">Versão preparada para PWA</p>

<button id="installBtn" class="btn install" style="display:none">📲 Instalar Aplicativo</button>
<button class="btn calc" onclick="alert('Exemplo PWA pronto para integrar ao sistema principal')">Teste</button>
<button class="btn pdf" onclick="window.print()">Gerar PDF</button>

<div class="info">
<h3>Arquivos necessários para o PWA</h3>
<p>1. manifest.json</p>
<p>2. sw.js</p>
<p>3. icon-192.png</p>
<p>4. icon-512.png</p>
</div>
</div>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
 e.preventDefault();
 deferredPrompt = e;
 document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click', async ()=>{
 if(!deferredPrompt) return;
 deferredPrompt.prompt();
 await deferredPrompt.userChoice;
 deferredPrompt = null;
});
</script>
</body>
</html>
