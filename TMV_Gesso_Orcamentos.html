<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMV Gesso - Orçamentos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#006d6f;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#f3f3f3;border-radius:25px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.15)}
.cabecalho{text-align:center;margin-bottom:25px}
.cabecalho h1{font-size:42px;color:#161b69}
.cabecalho p{color:#666}
.input-group{margin-bottom:15px}
label{display:block;font-weight:bold;margin-bottom:5px}
input{width:100%;padding:14px;border:1px solid #ccc;border-radius:10px}
.btn{width:100%;padding:15px;border:none;border-radius:40px;color:#fff;font-weight:bold;cursor:pointer;margin-top:10px}
.calc{background:#161b69}
.pdf{background:#198754}
.reset{background:#d32f2f}
.box{background:#e8e8e8;padding:20px;border-radius:15px;margin-top:20px}
.item{background:#fff;border-left:5px solid #161b69;padding:15px;border-radius:10px;margin-top:10px}
@media print{
body{background:#fff}
.btn{display:none}
.card{box-shadow:none}
}
</style>
</head>
<body>
<div class="container">
<div class="card">

<div class="cabecalho">
<h1>TMV GESSO</h1>
<p>Forros • Divisórias • Acabamentos</p>
<hr style="margin-top:10px">
</div>

<div class="input-group">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="input-group">
<label>Telefone</label>
<input id="telefone">
</div>

<div class="input-group">
<label>Endereço</label>
<input id="endereco">
</div>

<div class="input-group">
<label>Ambiente / Local</label>
<input id="local">
</div>

<div class="input-group">
<label>Largura (m)</label>
<input type="number" step="0.01" id="largura">
</div>

<div class="input-group">
<label>Comprimento (m)</label>
<input type="number" step="0.01" id="comprimento">
</div>

<div class="input-group">
<label>Valor por m² (R$)</label>
<input type="number" step="0.01" id="valorMetro">
</div>

<button class="btn calc" onclick="calcular()">Calcular e Salvar</button>
<button class="btn pdf" onclick="window.print()">Gerar PDF</button>
<button class="btn reset" onclick="resetar()">Resetar Histórico</button>

<div class="box">
<h2>Resultado do Ambiente</h2>
<p id="resultadoArea">Área: 0 m²</p>
<p id="resultadoValor">Valor: R$ 0,00</p>
</div>

<div class="box">
<h2>Totais Gerais</h2>
<p id="totalArea">Metragem Total: 0 m²</p>
<p id="totalValor"><strong>Valor Total Geral: R$ 0,00</strong></p>
</div>

<div class="box">
<h2>Histórico</h2>
<div id="historico"></div>
</div>

</div>
</div>

<script>
let historico = JSON.parse(localStorage.getItem("tmvHistorico")) || [];

function atualizar(){
 let div=document.getElementById("historico");
 div.innerHTML="";
 let somaArea=0,somaValor=0;

 historico.forEach(i=>{
   somaArea+=i.area;
   somaValor+=i.valor;
   div.innerHTML+=`
   <div class="item">
   <strong>${i.local}</strong><br>
   Área: ${i.area.toFixed(2)} m²<br>
   Valor: R$ ${i.valor.toFixed(2)}<br>
   <small>${i.data}</small>
   </div>`;
 });

 if(historico.length===0) div.innerHTML="Nenhum cálculo salvo.";

 document.getElementById("totalArea").innerHTML="Metragem Total: "+somaArea.toFixed(2)+" m²";
 document.getElementById("totalValor").innerHTML="<strong>Valor Total Geral: R$ "+somaValor.toFixed(2)+"</strong>";
}

function calcular(){
 let local=document.getElementById("local").value;
 let largura=parseFloat(document.getElementById("largura").value);
 let comprimento=parseFloat(document.getElementById("comprimento").value);
 let valorMetro=parseFloat(document.getElementById("valorMetro").value);

 if(!local || isNaN(largura)||isNaN(comprimento)||isNaN(valorMetro)){
   alert("Preencha todos os campos do ambiente.");
   return;
 }

 let area=largura*comprimento;
 let valor=area*valorMetro;

 document.getElementById("resultadoArea").innerHTML="Área: "+area.toFixed(2)+" m²";
 document.getElementById("resultadoValor").innerHTML="Valor: R$ "+valor.toFixed(2);

 historico.push({
   local, area, valor,
   data:new Date().toLocaleString("pt-BR")
 });

 localStorage.setItem("tmvHistorico",JSON.stringify(historico));
 atualizar();
}

function resetar(){
 if(confirm("Apagar todo o histórico?")){
   historico=[];
   localStorage.removeItem("tmvHistorico");
   atualizar();
 }
}

atualizar();
</script>
</body>
</html>
